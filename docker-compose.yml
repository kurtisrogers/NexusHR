services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: nexushr
      POSTGRES_PASSWORD: nexushr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushr"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: hrms.settings.production
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,.localhost,127.0.0.1
      TENANT_BASE_DOMAIN: localhost
      TENANT_URL_SCHEME: http
      TENANT_PORT: "8000"
      DB_NAME: nexushr
      DB_USER: nexushr
      DB_PASSWORD: nexushr
      DB_HOST: db
      DB_PORT: "5432"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_plans &&
             gunicorn hrms.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  postgres_data:
